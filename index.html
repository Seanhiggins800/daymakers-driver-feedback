<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daymakers — Driver Feedback</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f4f8; padding: 20px 16px 60px; }
.btn { cursor: pointer; border: none; font-weight: 700; border-radius: 8px; transition: opacity 0.15s, transform 0.1s; }
.btn:hover { opacity: 0.9; }
.btn:active { transform: scale(0.97); }
input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #1a1a2e; }
textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px 14px; font-size: 13px; font-family: inherit; resize: vertical; outline: none; }
textarea:focus { border-color: #5BB8E8; }
@keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.card { animation: slideIn 0.3s ease forwards; }
.sent-badge { text-align: center; padding: 10px; border-radius: 8px; background: #e8f5e9; color: #27ae60; font-weight: 700; font-size: 14px; margin-top: 12px; }
.skip-badge { text-align: center; padding: 10px; border-radius: 8px; background: #f5f5f5; color: #888; font-weight: 700; font-size: 14px; margin-top: 12px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const GET_URL = "https://daymakersmoving.app.n8n.cloud/webhook/driver-feedback";
const SEND_URL = "https://daymakersmoving.app.n8n.cloud/webhook/send-driver-message";

const NAVY = "#1a1a2e";
const GOLD = "#E7C72F";
const SKY = "#5BB8E8";
const GREEN = "#27ae60";
const RED = "#e74c3c";

function TypePill({ type }) {
  const map = {
    'pre-trip': { bg: '#e3f2fd', color: '#1565c0', label: 'PRE-TRIP' },
    'post-trip': { bg: '#e8f5e9', color: '#2e7d32', label: 'POST-TRIP' },
    'eld': { bg: '#fff3e0', color: '#e65100', label: 'ELD' },
  };
  const s = map[type] || map['eld'];
  return <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: 1.2, background: s.bg, color: s.color, padding: '3px 8px', borderRadius: 4 }}>{s.label}</span>;
}

function DriverCard({ driver, onSent, onSkipped }) {
  const sentences = typeof driver['AI Sentences'] === 'string'
    ? JSON.parse(driver['AI Sentences'])
    : (driver['AI Sentences'] || []);

  const [checked, setChecked] = useState(() => {
    const init = {};
    sentences.forEach((s, i) => { init[i] = true; });
    return init;
  });
  const [customNote, setCustomNote] = useState('');
  const [sending, setSending] = useState(false);
  const [done, setDone] = useState(null);

  const toggle = (i) => setChecked(prev => ({ ...prev, [i]: !prev[i] }));

  const selectedSentences = sentences.filter((_, i) => checked[i]).map(s => s.text);
  const hasSelected = selectedSentences.length > 0 || customNote.trim().length > 0;

  const buildMessage = () => {
    const parts = [...selectedSentences];
    if (customNote.trim()) parts.push(customNote.trim());
    return 'Hi ' + driver['Driver Name'].split(' ')[0] + ', this is Daymakers Moving & Storage.\n\n' + parts.join('\n\n');
  };

  const handleSend = async () => {
    if (!hasSelected) return;
    setSending(true);
    try {
      await fetch(SEND_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          phone: driver['Driver Phone'],
          message: buildMessage(),
          rowNumber: driver.row_number
        })
      });
      setDone('sent');
      onSent();
    } catch (e) {
      console.error(e);
    } finally {
      setSending(false);
    }
  };

  const handleSkip = () => {
    setDone('skipped');
    onSkipped();
  };

  const allPass = sentences.every(s => s.pass);

  return (
    <div className="card" style={{
      background: '#fff',
      border: '1px solid #e0e0e0',
      borderLeft: `4px solid ${allPass ? GREEN : RED}`,
      borderRadius: 12,
      padding: 20,
      marginBottom: 16
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
        <div>
          <div style={{ fontSize: 16, fontWeight: 700, color: NAVY }}>{driver['Driver Name']}</div>
          <div style={{ fontSize: 12, color: '#888', marginTop: 3 }}>
            Foreman: {driver['Foreman Name']} · Job {driver['Job Numbers']} · {driver['Date']}
          </div>
          <div style={{ fontSize: 12, color: '#888', marginTop: 2 }}>{driver['Driver Phone']}</div>
        </div>
        <div style={{
          background: allPass ? '#e8f5e9' : '#fff3e0',
          color: allPass ? GREEN : '#e65100',
          fontSize: 10, fontWeight: 800, padding: '4px 10px', borderRadius: 4, letterSpacing: 1
        }}>
          {allPass ? '✓ ALL PASS' : '⚠ HAS ISSUES'}
        </div>
      </div>

      <div style={{ marginBottom: 14 }}>
        {sentences.map((s, i) => (
          <div key={i} onClick={() => !done && toggle(i)} style={{
            display: 'flex', alignItems: 'flex-start', gap: 10,
            padding: '10px 12px', marginBottom: 6,
            background: checked[i] ? (s.pass ? '#f0faf4' : '#fff8f0') : '#fafafa',
            border: `1px solid ${checked[i] ? (s.pass ? '#c8e6c9' : '#ffe0b2') : '#eee'}`,
            borderRadius: 8, cursor: done ? 'default' : 'pointer', transition: 'all 0.15s'
          }}>
            <input type="checkbox" checked={!!checked[i]} onChange={() => toggle(i)} disabled={!!done} onClick={e => e.stopPropagation()} />
            <div style={{ flex: 1 }}>
              <div style={{ marginBottom: 4 }}><TypePill type={s.type} /></div>
              <p style={{ fontSize: 13, color: '#333', lineHeight: 1.6 }}>{s.text}</p>
            </div>
          </div>
        ))}
      </div>

      {!done && (
        <>
          <textarea
            rows={3}
            placeholder="Add a custom note (optional)..."
            value={customNote}
            onChange={e => setCustomNote(e.target.value)}
            style={{ marginBottom: 12 }}
          />
          <div style={{ display: 'flex', gap: 10 }}>
            <button className="btn" onClick={handleSkip} style={{
              flex: 1, padding: '10px 0', background: '#f5f5f5', color: '#888', fontSize: 14
            }}>Skip</button>
            <button className="btn" onClick={handleSend} disabled={!hasSelected || sending} style={{
              flex: 2, padding: '10px 0',
              background: hasSelected ? NAVY : '#ddd',
              color: hasSelected ? GOLD : '#aaa',
              fontSize: 14
            }}>
              {sending ? 'Sending...' : 'Send Message →'}
            </button>
          </div>
        </>
      )}

      {done === 'sent' && <div className="sent-badge">✓ Message Sent</div>}
      {done === 'skipped' && <div className="skip-badge">— Skipped</div>}
    </div>
  );
}

function App() {
  const [drivers, setDrivers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [sentCount, setSentCount] = useState(0);
  const [skippedCount, setSkippedCount] = useState(0);
  const [filter, setFilter] = useState('All');

  useEffect(() => { load(); }, []);

  const load = async () => {
    try {
      setLoading(true);
      const res = await fetch(GET_URL);
      const data = await res.json();
      setDrivers(Array.isArray(data) ? data : []);
    } catch (e) {
      setError('Could not connect. Please check your connection.');
    } finally {
      setLoading(false);
    }
  };

  const total = drivers.length;
  const actioned = sentCount + skippedCount;
  const allDone = total > 0 && actioned >= total;

  const filtered = filter === 'Issues Only'
    ? drivers.filter(d => {
        const s = typeof d['AI Sentences'] === 'string' ? JSON.parse(d['AI Sentences']) : (d['AI Sentences'] || []);
        return s.some(x => !x.pass);
      })
    : drivers;

  return (
    <div style={{ maxWidth: 700, margin: '0 auto' }}>
      <div style={{ background: NAVY, padding: '20px 24px', borderRadius: '12px 12px 0 0' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={{ color: GOLD, fontWeight: 800, fontSize: 17, letterSpacing: 1.5 }}>DAYMAKERS MOVING & STORAGE</div>
            <div style={{ color: '#a0a0b0', fontSize: 11, marginTop: 3, letterSpacing: 0.8 }}>DRIVER FEEDBACK PORTAL</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ color: GOLD, fontSize: 28, fontWeight: 800, lineHeight: 1 }}>{total - actioned}</div>
            <div style={{ color: '#a0a0b0', fontSize: 10, letterSpacing: 1 }}>REMAINING</div>
          </div>
        </div>
      </div>

      {!loading && !error && total > 0 && (
        <div style={{ background: '#f3f3f3', borderLeft: '1px solid #e0e0e0', borderRight: '1px solid #e0e0e0', padding: '8px 24px', display: 'flex', gap: 20, fontSize: 12, color: '#666', flexWrap: 'wrap', alignItems: 'center' }}>
          <span>Total: <strong>{total}</strong></span>
          <span>Sent: <strong style={{ color: GREEN }}>{sentCount}</strong></span>
          <span>Skipped: <strong style={{ color: '#888' }}>{skippedCount}</strong></span>
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
            {['All', 'Issues Only'].map(f => (
              <button key={f} onClick={() => setFilter(f)} style={{
                padding: '4px 12px', borderRadius: 6, border: 'none', cursor: 'pointer', fontSize: 11, fontWeight: 700,
                background: filter === f ? NAVY : '#e0e0e0',
                color: filter === f ? GOLD : '#666'
              }}>{f}</button>
            ))}
          </div>
        </div>
      )}

      <div style={{ border: '1px solid #e0e0e0', borderTop: 'none', borderRadius: '0 0 12px 12px', padding: 20, background: '#fafafa', minHeight: 200 }}>
        {loading && <div style={{ textAlign: 'center', padding: 60, color: '#aaa', fontSize: 14 }}>Loading drivers...</div>}

        {error && (
          <div style={{ textAlign: 'center', padding: 40 }}>
            <div style={{ color: RED, fontSize: 14, marginBottom: 12 }}>{error}</div>
            <button className="btn" onClick={load} style={{ background: NAVY, color: GOLD, padding: '10px 24px', fontSize: 14 }}>Retry</button>
          </div>
        )}

        {!loading && !error && allDone && (
          <div style={{ textAlign: 'center', padding: 60 }}>
            <div style={{ fontSize: 48, marginBottom: 14 }}>✅</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: NAVY, marginBottom: 8 }}>All Drivers Reviewed</div>
            <div style={{ color: '#888', fontSize: 14 }}>{sentCount} message{sentCount !== 1 ? 's' : ''} sent, {skippedCount} skipped.</div>
          </div>
        )}

        {!loading && !error && !allDone && drivers.length === 0 && (
          <div style={{ textAlign: 'center', padding: 60, color: '#aaa', fontSize: 14 }}>No driver feedback ready at this time.</div>
        )}

        {!loading && !error && !allDone && filtered.map((driver, idx) => (
          <DriverCard
            key={driver.row_number || idx}
            driver={driver}
            onSent={() => setSentCount(c => c + 1)}
            onSkipped={() => setSkippedCount(c => c + 1)}
          />
        ))}
      </div>

      <div style={{ textAlign: 'center', padding: '14px 0 0', color: '#bbb', fontSize: 11 }}>
        Daymakers Driver Feedback System
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
